name: StockFlow CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Check backend builds ─────────────────────
  check-backend:
    name: Backend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate --config prisma.config.mjs
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Check TypeScript compiles
        run: npx tsc --noEmit

      - name: Success
        run: echo "✅ Backend builds successfully"

  # ── Job 2: Check frontend builds ────────────────────
  check-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://placeholder.railway.app/api

      - name: Success
        run: echo "✅ Frontend builds successfully"

  # ── Job 3: Deploy backend to Railway ────────────────
  # Only runs when:
  #   - push is to main branch (not dev, not pull request)
  #   - check-backend job passed
  #   - check-frontend job passed
deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: [check-backend, check-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Link Railway project
        run: |
          railway link \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy service
        run: |
          railway redeploy \
            --service ${{ secrets.RAILWAY_SERVICE_ID }} \
            --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Success
        run: echo "✅ Backend deployed to Railway"

# ── Job 4: Deploy frontend to Vercel ────────────────
deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [check-backend, check-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify dist folder exists
        run: |
          echo "Contents of frontend/dist:"
          ls -la frontend/dist/

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          vercel deploy frontend/dist --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Success
        run: echo "✅ Frontend deployed to Vercel" 
