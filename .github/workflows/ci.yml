name: StockFlow CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  check-backend:
    name: Backend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate --config prisma.config.mjs
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Check TypeScript compiles
        run: npx tsc --noEmit

      - name: Success
        run: echo "Backend builds successfully"

  check-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://placeholder.railway.app/api

      - name: Success
        run: echo "Frontend builds successfully"

  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: [check-backend, check-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Validate Railway secrets
        run: |
          [ -n "${{ secrets.RAILWAY_TOKEN }}" ] || (echo "Missing RAILWAY_TOKEN" && exit 1)
          [ -n "${{ secrets.RAILWAY_SERVICE_ID }}" ] || (echo "Missing RAILWAY_SERVICE_ID" && exit 1)
          [ -n "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" ] || (echo "Missing RAILWAY_ENVIRONMENT_ID" && exit 1)

      - name: Trigger Railway Redeploy
        run: |
          curl --fail --show-error --silent \
            -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            --data-raw "{\"query\":\"mutation { serviceInstanceRedeploy(serviceId: \\\"${{ secrets.RAILWAY_SERVICE_ID }}\\\", environmentId: \\\"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\\\") }\"}"

      - name: Success
        run: echo "Backend redeployment triggered"

      - name: Verify deployment
        run: |
          echo "Waiting 90 seconds for Railway to deploy..."
          sleep 90
          MAX_RETRIES=10
          RETRY_COUNT=0
          SUCCESS=false
          until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Health check attempt $RETRY_COUNT/$MAX_RETRIES..."
            if curl --fail --silent --max-time 10 \
              https://web-production-f5a2d.up.railway.app/health; then
              echo ""
              echo "Deployment verified successfully"
              SUCCESS=true
              break
            fi
            echo "Not ready yet, waiting 15 seconds..."
            sleep 15
          done
          if [ "$SUCCESS" = false ]; then
            echo "Warning: Could not verify deployment within timeout"
            echo "Check Railway dashboard manually"
            echo "This does not mean deployment failed"
            exit 0
          fi

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [check-backend, check-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify dist folder
        run: ls -la frontend/dist/

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          vercel deploy --prod \
            --cwd . \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TELEMETRY_DISABLED: "1"

      - name: Verify dist folder
        run: ls -la frontend/dist/

      - name: Success
        run: echo "Frontend deployed to Vercel"
